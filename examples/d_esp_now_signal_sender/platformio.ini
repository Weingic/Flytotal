; Standalone helpers for testing D receiver board.
; Open this folder as a separate PlatformIO project.

[platformio]
default_envs = esp_now_sender

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

upload_speed = 115200
upload_port = COM4
monitor_port = COM4
monitor_echo = yes
monitor_filters = send_on_enter, time

[env:mac_reader]
build_src_filter =
    +<MAC.cpp>
    -<main.cpp>

[env:esp_now_sender]
build_src_filter =
    +<main.cpp>
    -<MAC.cpp>
